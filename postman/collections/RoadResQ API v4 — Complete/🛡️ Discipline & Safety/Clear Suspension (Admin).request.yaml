$kind: http-request
name: 'Clear Suspension (Admin)'
method: PUT
url: '{{base_url}}/api/discipline/clear/{{driverId}}'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: '{"adminNote":"Driver completed retraining. Suspension cleared."}'
description: 'Resets warning count and lifts suspension.'
