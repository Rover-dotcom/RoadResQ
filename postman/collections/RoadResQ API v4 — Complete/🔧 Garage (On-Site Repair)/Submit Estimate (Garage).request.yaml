$kind: http-request
name: 'Submit Estimate (Garage)'
method: POST
url: '{{base_url}}/api/garage-requests/{{garageRequestId}}/estimate'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "garageId": "{{garageId}}",
      "garageName": "Al Sadd Auto Service",
      "estimatedCost": 15000,
      "estimatedTimeMinutes": 45,
      "notes": "Battery replacement + diagnostics"
    }
